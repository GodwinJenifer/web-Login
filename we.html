<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login site</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }
    body{
        background: url(yy.jpg) no-repeat center;

        background-size: cover;
       

    }
    .nav ul{
        display: flex;
        flex-direction: row;
        color: aliceblue;
        font-size: 20px;
       justify-content: end;
       margin-right: 110px;
       list-style: none;
      
      
    }
    li{
         
        padding: 10px;
    }
    .con form{
       display: flex;
       flex-direction: column;
        border: 2px solid rgb(255, 255, 255,.2);
        backdrop-filter: blur(20px);
        box-shadow: 0 0 10px rgba(0, 0, 0, .2);
        padding: 100px;
        margin-top: 110px;
        margin-left: 450px;
        background: transparent;
        width: 500px;
        height: 350px;
        font-size: 5px;

    }
    h1{
        margin-top: -90px;
        margin-left: 60px;
        font-size: 35px;
    }
input{
    color: black;
    margin-top: 30px;
    background: transparent;
    display: inline-block;
    border-top: none;
    border-left: none;
    border-right: none;
    margin-bottom: 20px;
   

}
input::placeholder {
  color: rgb(0, 0, 0);
   font-size: 15px;
}

label{
     font-size: 15px;
}
.bu{
    color: aliceblue;
    display: block;
     background: transparent;
    border: 1px solid rgb(255, 255, 255,.2);
       padding: 5px;
       box-shadow: 0 0 5px 5px rgba(0,0,0,0.3);
        backdrop-filter: blur(50px);
       transition: 1.5s;
       border-radius: 10px;
}
.bu:hover{
  background-color: aliceblue;
  color: black;
}
.link{
     color: aliceblue;
    margin-top: 10px;
    font-size: 15px;
}
a{
    color: aliceblue;
}
.reg{
    color: aliceblue;
    text-decoration: none;
    margin-left: 80px;
   
}

</style>
<body>
    <nav class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Service</li>
             <li>Number</li>
        </ul>
    </nav>
    <div class="con">
    <form action="">
      <h1> Log IN</h1>
       <input type="text" required placeholder="Username">
      
       <input type="password" required placeholder="Password" >
      <Label>  <input type="checkbox"> Remeber ME  </Label>
       <button type="submit" class="bu"> Log in </button>

      <div class="link"><a href=""> Do not have a account ?</a>
        <a href="" class="reg">Register</a></div>
    </div>
    </form>
    
</body>
